<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeacherPro</title>
    <style>
      /* Injected early so WKWebView picks these up before any JS renders.
         Tailwind's * rules sometimes don't reach the root scroll container
         in a production Tauri/WKWebView build. */
      :root { color-scheme: dark; }
      html, body, #root { background: #121212; }
      ::-webkit-scrollbar { -webkit-appearance: none; width: 6px !important; height: 6px !important; }
      ::-webkit-scrollbar-track { background: #161616 !important; }
      ::-webkit-scrollbar-thumb { background-color: #3a3a3a !important; border-radius: 9999px; border: 1px solid #161616; }
      ::-webkit-scrollbar-thumb:hover { background-color: #555555 !important; }
      ::-webkit-scrollbar-corner { background: #161616 !important; }
      * { scrollbar-width: thin; scrollbar-color: #3a3a3a #161616; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
