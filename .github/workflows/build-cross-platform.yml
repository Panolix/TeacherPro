name: Build Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.2.1)"
        required: true
        type: string

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add universal OSX targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: install app dependencies
        run: npm ci

      - name: Validate and sync versions from input
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Setting version to $VERSION"
          node scripts/sync-version.mjs "$VERSION"

      - name: load release body
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          NOTES_FILE="RELEASE_NOTES_v${VERSION}.md"

          if [ -f "$NOTES_FILE" ]; then
            echo "Using release notes from $NOTES_FILE"
            {
              echo "RELEASE_BODY<<EOF"
              cat "$NOTES_FILE"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            echo "No release notes file found for ${VERSION}; using fallback body."
            echo "RELEASE_BODY=Download the installers for Windows, macOS, and Linux below." >> "$GITHUB_ENV"
          fi

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ github.event.inputs.version }}
          releaseName: 'TeacherPro v${{ github.event.inputs.version }}'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: true
          prerelease: false
          retryAttempts: 2
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
