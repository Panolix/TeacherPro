name: 'Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: get version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: load release body
        shell: bash
        run: |
          NOTES_FILE="RELEASE_NOTES_v${VERSION}.md"

          if [ -f "$NOTES_FILE" ]; then
            echo "Using release notes from $NOTES_FILE"
            {
              echo "RELEASE_BODY<<EOF"
              cat "$NOTES_FILE"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            echo "No release notes file found for ${VERSION}; using fallback body."
            echo "RELEASE_BODY=See CHANGELOG.md and the bundled assets for this release." >> "$GITHUB_ENV"
          fi
      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          name: TeacherPro ${{ env.VERSION }}
          body: ${{ env.RELEASE_BODY }}

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Apple universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      # Syncs versions dynamically with whatever the Github tag is 
      # e.g., strips "v" from "v1.2.3" -> "1.2.3"
      - name: Update versions from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Setting version to $VERSION"
          npm version $VERSION --no-git-tag-version --allow-same-version || true
          
          # Update src-tauri/tauri.conf.json and Cargo.toml dynamically
          jq ".version = \"$VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.tmp.json && mv src-tauri/tauri.conf.tmp.json src-tauri/tauri.conf.json
          sed -i.bak -e "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
